name: lx_music_flutter
description: LX Music - 一个免费的音乐查找助手
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  
  # 路由
  go_router: ^14.8.1
  
  # 音频播放
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  rxdart: ^0.28.0
  
  # 网络
  dio: ^5.7.0
  
  # 存储
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3
  
  # JS 引擎
  flutter_js: ^0.8.2
  
  # 工具
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.4.0
  file_picker: ^8.0.3
  encrypt: ^5.0.3
  charset: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
